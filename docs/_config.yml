remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for Komi Permyak ⇒ Komi Zyryan
description: An electronic dictionary from Komi Permyak to Komi Zyryan
plugins:
  - jekyll-remote-theme
